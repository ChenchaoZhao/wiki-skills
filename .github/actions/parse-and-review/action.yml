name: Parse Agent Decision and Submit Review
description: Parses agent review output and submits a GitHub PR review

inputs:
  github-token:
    description: GitHub token
    required: true

runs:
  using: composite
  steps:
    - name: Parse and submit review
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const comments = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          
          const agentComment = comments.data[comments.data.length - 1]?.body || '';
          
          const decisionMatch = agentComment.match(/\[REVIEW_DECISION\]([\s\S]*?)\[\/REVIEW_DECISION\]/);
          if (!decisionMatch) {
            console.log('No structured decision found');
            return;
          }
          
          const decision = decisionMatch[1];
          let status = 'COMMENT';
          let reason = 'Agent review completed';
          
          if (decision.includes('STATUS: APPROVE')) {
            status = 'APPROVE';
            const reasonMatch = decision.match(/REASON: (.*?)$/m);
            reason = reasonMatch ? reasonMatch[1].trim() : 'Approved by agent';
          } else if (decision.includes('STATUS: REQUEST_CHANGES')) {
            status = 'REQUEST_CHANGES';
            const reasonMatch = decision.match(/REASON: (.*?)$/m);
            reason = reasonMatch ? reasonMatch[1].trim() : 'Changes requested';
          }
          
          await github.rest.pulls.createReview({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
            event: status,
            body: reason
          });
          
          console.log(`Review submitted: ${status} - ${reason}`);
