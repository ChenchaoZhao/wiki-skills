name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  reviewer_one:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/deepseek-v4-flash-free
          use_github_token: true
          prompt: |
            Review this pull request and output your decision in this format:
            [REVIEW_DECISION]
            STATUS: APPROVE | REQUEST_CHANGES | COMMENT
            REASON: <explanation>
            [/REVIEW_DECISION]
            
            Focus on: bugs, security, test usefulness

      - uses: ./.github/actions/parse-and-review
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  reviewer_two:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/deepseek-v4-flash-free
          use_github_token: true
          prompt: |
            Review this pull request and output your decision in this format:
            [REVIEW_DECISION]
            STATUS: APPROVE | REQUEST_CHANGES | COMMENT
            REASON: <explanation>
            [/REVIEW_DECISION]
            
            Focus on: code quality, organization, PR description alignment

      - uses: ./.github/actions/parse-and-review
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
