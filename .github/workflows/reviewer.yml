name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write    # Add this line
      issues: write           # Add this line for issue reactions/comments
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # You can change this to "minimax/big-pickle" or "zhipu/glm-4" 
          # depending on which Zen model you prefer to rotate to.
          model: "groq/grok-code-fast-1"
          use_github_token: true  # Use the GitHub token for authentication
          prompt: |
            Review this pull request:
            - Check for code quality issues
            - Look for potential bugs
            - Verify type annotations follow project conventions
            - Suggest improvements
